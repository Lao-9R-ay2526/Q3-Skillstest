<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Bootstrap 5 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container-fluid bg-primary col-6 mt-5 rounded mb-5">
        <h1 class="text-center">Cineby</h1>
        <hr>

        
        <div class="contain bg-dark text-white mt-6 inline-block rounded " style="font-family: Gill Sans;">
            <h1 class="text-center ">Student Details</h1><br><br>
            <form>
                <div class="contain2">
                <!-- Student Details -->
                <div class="">
                    <label class="form-label">Full name</label>
                    <input type="text" class="form-control mb-3" placeholder="Enter Your Fullname" required>
                </div>

                <!-- Ticket Ordering -->
                <div class="hello">
                    <label class="form-label"> Ticket Order</label>
                    
                    <input type="number" id="order-tickets" class="form-control" placeholder="250 per person">
                </div>
                <hr>
            <!-- Subtotal -->
                <div class="mb-2">
                    <h1>Payment Summary</h1>
                    <p>SubTotal <span id="subtotal" class="badge bg-white text-dark">0$</span></p>
                    <p>Admin-Fee    <span class="badge bg-white text-dark">0$</span> </p>
                    <p>Ticket Price: 250$</p>

                    <h2>Total: <span id="totalcash" class="badge bg-white text-dark">0$</span></h2>
                </div>
                    <div id="total">

                    
                        <button type="button" class="btn btn-success mt-3 mb-5" onclick="getTotal()">Calculate</button>
                        <button type="button" class="btn btn-info mt-3 mb-5" onclick="window.location.reload()"> Reload</button>
                    </div>
                </div>

                
                    
                </div>
            </form>  
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
